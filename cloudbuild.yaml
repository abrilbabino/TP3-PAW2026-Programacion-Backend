steps:
  # 1. Construir la imagen
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-central1-docker.pkg.dev/project-f3583ede-db03-4872-95c/cloud-run-source-deploy/pawprints:$COMMIT_SHA', '.']

  # 2. Empujar la imagen al repositorio
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/project-f3583ede-db03-4872-95c/cloud-run-source-deploy/pawprints:$COMMIT_SHA']

  # 3. Desplegar en Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud run deploy pawprints \
          --image us-central1-docker.pkg.dev/project-f3583ede-db03-4872-95c/cloud-run-source-deploy/pawprints:$COMMIT_SHA \
          --region us-central1 \
          --platform managed

# configuracion del registro
options:
  logging: CLOUD_LOGGING_ONLY